<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Feedback System - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-page">
    <div class="login-container">

        <!-- Header with university branding -->
        <div class="login-header">
            <div class="university-seal">🎓</div>
            <h1>Student Feedback System</h1>
            <p>University Academic Portal</p>
        </div>

        <div class="login-body">
            <!-- Tab switcher: Student / Admin -->
            <div class="login-tabs">
                <button class="tab-btn active" onclick="switchTab('student')">Student Login</button>
                <button class="tab-btn" onclick="switchTab('admin')">Admin Login</button>
            </div>

            <!-- Alert message area (shown on errors or success) -->
            <div id="alertBox" style="display:none;"></div>

            <!-- ── STUDENT LOGIN FORM ── -->
            <div id="studentForm">
                <div class="form-group">
                    <label for="rollNumber">Roll Number</label>
                    <input type="text" id="rollNumber" placeholder="e.g. CS2021001" maxlength="20">
                </div>
                <div class="form-group">
                    <label for="studentPassword">Password</label>
                    <input type="password" id="studentPassword" placeholder="Enter your password">
                </div>
                <button class="btn btn-primary btn-full" onclick="studentLogin()">
                    <span id="studentBtnText">Login as Student</span>
                    <span id="studentSpinner" class="spinner" style="display:none;"></span>
                </button>
                <p style="text-align:center; margin-top:14px; font-size:0.8rem;">
                    Test: Roll# <strong>CS2021001</strong> | Password: <strong>student123</strong>
                </p>
            </div>

            <!-- ── ADMIN LOGIN FORM ── -->
            <div id="adminForm" style="display:none;">
                <div class="form-group">
                    <label for="adminEmail">Admin Email</label>
                    <input type="email" id="adminEmail" placeholder="admin@university.edu">
                </div>
                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <input type="password" id="adminPassword" placeholder="Enter admin password">
                </div>
                <button class="btn btn-primary btn-full" onclick="adminLogin()">
                    <span id="adminBtnText">Login as Admin</span>
                    <span id="adminSpinner" class="spinner" style="display:none;"></span>
                </button>
                <p style="text-align:center; margin-top:14px; font-size:0.8rem;">
                    Test: <strong>admin@university.edu</strong> | Password: <strong>admin123</strong>
                </p>
            </div>

        </div><!-- /login-body -->
    </div><!-- /login-container -->
</div>

<script>
// ── TAB SWITCHER ──────────────────────────
function switchTab(type) {
    // Show/hide forms
    document.getElementById('studentForm').style.display = type === 'student' ? 'block' : 'none';
    document.getElementById('adminForm').style.display   = type === 'admin'   ? 'block' : 'none';

    // Update active tab button
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', 
            (i === 0 && type === 'student') || (i === 1 && type === 'admin'));
    });

    clearAlert(); // Clear any error messages
}

// ── SHOW ALERT ────────────────────────────
function showAlert(message, type) {
    const icons = { success: '✅', error: '❌', info: 'ℹ️' };
    const box = document.getElementById('alertBox');
    box.className = `alert alert-${type}`;
    box.innerHTML = `<span>${icons[type]}</span> ${message}`;
    box.style.display = 'flex';
}

function clearAlert() {
    document.getElementById('alertBox').style.display = 'none';
}

// ── STUDENT LOGIN ─────────────────────────
async function studentLogin() {
    const rollNumber = document.getElementById('rollNumber').value.trim();
    const password   = document.getElementById('studentPassword').value;

    if (!rollNumber || !password) {
        return showAlert('Please enter roll number and password.', 'error');
    }

    // Show loading spinner
    document.getElementById('studentBtnText').textContent = 'Logging in...';
    document.getElementById('studentSpinner').style.display = 'inline-block';

    try {
        // Send POST request to backend API
        const response = await fetch('/auth/student-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ roll_number: rollNumber, password })
        });

        const data = await response.json();

        if (data.success) {
            showAlert('Login successful! Redirecting...', 'success');
            // Redirect to student dashboard after short delay
            setTimeout(() => { window.location.href = '/student'; }, 800);
        } else {
            showAlert(data.message, 'error');
        }
    } catch (err) {
        showAlert('Connection error. Is the server running?', 'error');
    } finally {
        // Hide spinner regardless of result
        document.getElementById('studentBtnText').textContent = 'Login as Student';
        document.getElementById('studentSpinner').style.display = 'none';
    }
}

// ── ADMIN LOGIN ───────────────────────────
async function adminLogin() {
    const email    = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value;

    if (!email || !password) {
        return showAlert('Please enter email and password.', 'error');
    }

    document.getElementById('adminBtnText').textContent = 'Logging in...';
    document.getElementById('adminSpinner').style.display = 'inline-block';

    try {
        const response = await fetch('/auth/admin-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.success) {
            showAlert('Admin login successful!', 'success');
            setTimeout(() => { window.location.href = '/admin-panel'; }, 800);
        } else {
            showAlert(data.message, 'error');
        }
    } catch (err) {
        showAlert('Connection error. Is the server running?', 'error');
    } finally {
        document.getElementById('adminBtnText').textContent = 'Login as Admin';
        document.getElementById('adminSpinner').style.display = 'none';
    }
}

// Allow pressing Enter key to submit forms
document.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        const studentVisible = document.getElementById('studentForm').style.display !== 'none';
        studentVisible ? studentLogin() : adminLogin();
    }
});
</script>
</body>
</html>
